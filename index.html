<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYTUBE - 성수동 핫플 정복!</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* 기본 스타일 리셋 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Roboto', 'Noto Sans KR', sans-serif; background-color: #fff; color: #0f0f0f; overflow-x: hidden; display: flex; }

        /* 공통 아이콘 플레이스홀더 */
        .icon { width: 24px; height: 24px; background-color: #ddd; border-radius: 4px; flex-shrink: 0; }

        /* -------------------------
           상단 바 (Header) 
        -------------------------- */
        .header {
            position: fixed; top: 0; left: 0; width: 100%; height: 56px;
            background-color: #fff; display: flex; align-items: center;
            justify-content: space-between; padding: 0 16px; border-bottom: 1px solid #e5e5e5; z-index: 1000;
        }

        /* 왼쪽 로고 영역 */
        .header-left { display: flex; align-items: center; gap: 16px; }
        .menu-icon { margin-left: -4px; cursor: pointer; }
        .logo-container { display: flex; align-items: center; gap: 4px; text-decoration: none; color: inherit; }
        
        /* 🔥 빨간색 재생 버튼을 검은색으로 변경 🔥 */
        .logo-play-button { width: 30px; height: 20px; background-color: #0f0f0f; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        .logo-play-button::after { content: ""; border-top: 5px solid transparent; border-left: 10px solid #fff; border-bottom: 5px solid transparent; }
        
        /* 🔥 YOUTUBE를 MYTUBE로 변경 (Roboto 폰트 사용) 🔥 */
        .logo-text { font-family: 'Roboto', sans-serif; font-size: 20px; font-weight: 700; color: #0f0f0f; }

        /* 중앙 검색창 영역 */
        .header-center { display: flex; align-items: center; gap: 8px; flex: 0 1 732px; }
        .search-form { display: flex; align-items: center; border: 1px solid #ccc; border-radius: 40px; overflow: hidden; height: 40px; flex: 1; }
        .search-input { border: none; padding: 0 16px; font-size: 16px; flex: 1; outline: none; }
        .search-icon-btn { width: 64px; height: 100%; border: none; background-color: #f8f8f8; border-left: 1px solid #ccc; cursor: pointer; }
        .search-icon-btn .icon { background-color: #606060; }
        .mic-icon-btn { width: 40px; height: 40px; border: none; border-radius: 50%; background-color: #f2f2f2; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .mic-icon-btn .icon { background-color: #0f0f0f; }

        /* 오른쪽 사용자 메뉴 영역 */
        .header-right { display: flex; align-items: center; gap: 12px; }
        .create-icon-btn { display: flex; align-items: center; gap: 8px; border: 1px solid #ccc; border-radius: 20px; padding: 6px 14px; background: none; cursor: pointer; font-size: 14px; font-weight: 500; }
        .create-icon-btn .icon { background-color: #0f0f0f; }
        .notification-icon-btn { background: none; border: none; cursor: pointer; }
        .notification-icon-btn .icon { background-color: #0f0f0f; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; background-color: #ff9800; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; }

        /* -------------------------
           왼쪽 사이드바 (Navigation) 
        -------------------------- */
        .sidebar {
            position: fixed; top: 56px; left: 0; width: 240px; height: calc(100vh - 56px);
            background-color: #fff; display: flex; flex-direction: column; padding: 12px 12px 0;
            overflow-y: auto; z-index: 999; border-right: 1px solid #e5e5e5;
        }

        /* 🔥 홈, 쇼츠, 구독, 나 항목 삽입 🔥 */
        .sidebar-item {
            display: flex; align-items: center; gap: 24px; padding: 10px 12px;
            cursor: pointer; border-radius: 10px; text-decoration: none; color: inherit; margin-bottom: 2px;
        }
        .sidebar-item:hover { background-color: #f2f2f2; }
        .sidebar-item.active { background-color: #f2f2f2; font-weight: 500; }
        .sidebar-item .icon { width: 20px; height: 20px; background-color: #0f0f0f; }
        .sidebar-text { font-size: 14px; color: #0f0f0f; }
        
        /* 아바타 아이콘 스타일 */
        .sidebar-avatar { width: 24px; height: 24px; border-radius: 50%; background-color: #ff9800; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 700; margin-left: -2px; }

        /* -------------------------
           메인 콘텐츠 (Main Content) 
        -------------------------- */
        .main-content {
            margin-left: 240px; padding-top: 56px; flex: 1; min-height: 100vh;
            background-color: #fafafa;
        }

        /* 상단 카테고리 필터 (Chips) */
        .category-chips {
            display: flex; gap: 12px; padding: 12px 24px;
            overflow-x: auto; white-space: nowrap;
            background-color: #fff; border-bottom: 1px solid #e5e5e5; position: sticky; top: 56px; z-index: 998;
        }
        .chip {
            background-color: rgba(0,0,0,0.05); border: none; padding: 8px 12px;
            border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; color: #0f0f0f;
        }
        .chip.active { background-color: #0f0f0f; color: #fff; }

        /* 비디오 그리드 컨테이너 */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 20px 16px; padding: 24px;
        }

        /* 개별 비디오 카드 */
        .video-card { display: flex; flex-direction: column; cursor: pointer; text-decoration: none; color: inherit; }
        
        /* 썸네일 영역 */
        .thumbnail-container {
            position: relative; width: 100%; padding-top: 56.25%; /* 16:9 비율 유지 */
            border-radius: 12px; overflow: hidden; background-color: #e5e5e5;
        }
        .thumbnail-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
        }
        /* 시간 뱃지 "1:00" */
        .duration-badge {
            position: absolute; bottom: 8px; right: 8px;
            background-color: rgba(0, 0, 0, 0.8); color: #fff;
            padding: 3px 4px; border-radius: 4px; font-size: 12px; font-weight: 500;
        }

        /* 하단 정보 영역 */
        .info-container { display: flex; margin-top: 12px; gap: 12px; }
        
        /* 채널 아바타 플레이스홀더 */
        .channel-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background-color: #ddd; flex-shrink: 0; object-fit: cover;
        }
        
        .text-info { flex-grow: 1; overflow: hidden; }
        
        /* 제목: "성수동 브이로그..." */
        .video-title {
            font-size: 16px; font-weight: 600; line-height: 1.4; color: #0f0f0f;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
            margin-bottom: 4px;
        }
        
        /* 채널 이름, 조회수 메타데이터 */
        .channel-name, .video-meta { font-size: 14px; color: #606060; margin-bottom: 2px; }
        .video-meta span { color: #606060; }
        .sponsor-tag { font-weight: 700; color: #0f0f0f; }

    </style>
</head>
<body>

    <header class="header">
        <div class="header-left">
            <button class="menu-icon mic-icon-btn"><div class="icon"></div></button>
            <a href="#" class="logo-container">
                <div class="logo-play-button"></div>
                <span class="logo-text">MYTUBE</span>
            </div>
        </div>
        <div class="header-center">
            <form class="search-form">
                <input type="text" placeholder="검색" class="search-input">
                <button type="submit" class="search-icon-btn"><div class="icon"></div></button>
            </form>
            <button class="mic-icon-btn"><div class="icon"></div></button>
        </div>
        <div class="header-right">
            <button class="create-icon-btn"><div class="icon"></div>만들기</button>
            <button class="notification-icon-btn"><div class="icon"></div></button>
            <div class="user-avatar">JM</div>
        </div>
    </header>

    <nav class="sidebar">
        <a href="#" class="sidebar-item active">
            <div class="icon"></div>
            <span class="sidebar-text">홈</span>
        </a>
        <a href="#" class="sidebar-item">
            <div class="icon"></div>
            <span class="sidebar-text">쇼츠</span>
        </a>
        <a href="#" class="sidebar-item">
            <div class="icon"></div>
            <span class="sidebar-text">구독</span>
        </a>
        <a href="#" class="sidebar-item">
            <div class="sidebar-avatar">JM</div>
            <span class="sidebar-text">나</span>
        </a>
    </nav>

    <main class="main-content">
        <div class="category-chips">
            <button class="chip active">전체</button>
            <button class="chip">음악</button>
            <button class="chip">믹스</button>
            <button class="chip">라이브</button>
            <button class="chip">성수동 핫플</button>
            <button class="chip">서울 브이로그</button>
        </div>

        <div class="video-grid">

            <a href="#" class="video-card">
                <div class="thumbnail-container">
                    <img src="./images/image_1.png" alt="성수동 브이로그 (낮)" class="thumbnail-img">
                    <span class="duration-badge">1:00</span>
                </div>
                <div class="info-container">
                    <img src="https://via.placeholder.com/36" alt="채널 아바타" class="channel-avatar">
                    <div class="text-info">
                        <h3 class="video-title">성수동 브이로그 요즘 핫플 정복!🔥 디올부터 하우스 노웨어까지✨</h3>
                        <div class="channel-name">성수 힙스터</div>
                        <div class="video-meta">조회수 240회 <span>•</span> 1주 전</div>
                    </div>
                </div>
            </div>

            <a href="#" class="video-card">
                <div class="thumbnail-container">
                    <img src="./images/image_2.png" alt="성수동 브이로그 (저녁)" class="thumbnail-img">
                    <span class="duration-badge">1:00</span>
                </div>
                <div class="info-container">
                    <img src="https://via.placeholder.com/36" alt="채널 아바타" class="channel-avatar">
                    <div class="text-info">
                        <h3 class="video-title">성수동 브이로그 요즘 핫플 정복!🔥 디올부터 하우스 노웨어까지✨</h3>
                        <div class="channel-name">성수 힙스터</div>
                        <div class="video-meta">조회수 240회 <span>•</span> 1주 전</div>
                    </div>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
