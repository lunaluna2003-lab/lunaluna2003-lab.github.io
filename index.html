<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYTUBE - 성수동 핫플 정복!</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* 기본 스타일 리셋 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Roboto', 'Noto Sans KR', sans-serif; background-color: #fff; color: #0f0f0f; overflow-x: hidden; display: flex; }

        .icon { width: 24px; height: 24px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .icon svg { width: 100%; height: 100%; fill: currentColor; }

        /* -------------------------
           상단 바 (Header) 
        -------------------------- */
        .header { position: fixed; top: 0; left: 0; width: 100%; height: 56px; background-color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid #e5e5e5; z-index: 1000; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .menu-icon { margin-left: -4px; cursor: pointer; background: none; border: none; padding: 8px; border-radius: 50%; }
        .menu-icon:hover { background-color: #f2f2f2; }
        .logo-container { display: flex; align-items: center; gap: 4px; text-decoration: none; color: inherit; }
        .logo-play-button { width: 30px; height: 20px; background-color: #0f0f0f; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        .logo-play-button::after { content: ""; border-top: 5px solid transparent; border-left: 10px solid #fff; border-bottom: 5px solid transparent; }
        .logo-text { font-family: 'Roboto', sans-serif; font-size: 20px; font-weight: 700; color: #0f0f0f; letter-spacing: -0.5px; }

        .header-center { display: flex; align-items: center; gap: 8px; flex: 0 1 732px; justify-content: center; }
        .search-form { display: flex; align-items: center; border: 1px solid #ccc; border-radius: 40px; overflow: hidden; height: 40px; flex: 1; max-width: 600px; }
        .search-input { border: none; padding: 0 16px; font-size: 16px; flex: 1; outline: none; }
        .search-icon-btn { width: 64px; height: 100%; border: none; background-color: #f8f8f8; border-left: 1px solid #ccc; cursor: pointer; color: #0f0f0f; }
        .mic-icon-btn { width: 40px; height: 40px; border: none; border-radius: 50%; background-color: #f2f2f2; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #0f0f0f; }

        .header-right { display: flex; align-items: center; gap: 12px; }
        .create-icon-btn { display: flex; align-items: center; gap: 8px; border: 1px solid #ccc; border-radius: 20px; padding: 6px 14px; background: none; cursor: pointer; font-size: 14px; font-weight: 500; background-color: #f2f2f2;}
        .notification-icon-btn { background: none; border: none; cursor: pointer; padding: 8px; border-radius: 50%; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; object-fit: cover; }
        
        /* 모바일용 우측 상단 메뉴 아이콘 (기본은 숨김) */
        .menu-icon-mobile { display: none; cursor: pointer; background: none; border: none; padding: 8px; border-radius: 50%; }

        /* -------------------------
           사이드바 및 오버레이 (목록 바)
        -------------------------- */
        .sidebar-overlay { display: none; } /* PC에서는 오버레이 숨김 */
        
        .sidebar { position: fixed; top: 56px; left: 0; width: 240px; height: calc(100vh - 56px); background-color: #fff; display: flex; flex-direction: column; padding: 12px 12px 0; overflow-y: auto; z-index: 999; border-right: 1px solid #e5e5e5; }
        .sidebar-item { display: flex; align-items: center; gap: 24px; padding: 10px 12px; cursor: pointer; border-radius: 10px; text-decoration: none; color: inherit; margin-bottom: 2px; }
        .sidebar-item:hover { background-color: #f2f2f2; }
        .sidebar-item.active { background-color: #f2f2f2; font-weight: 500; }
        .sidebar-text { font-size: 14px; color: #0f0f0f; }
        .sidebar-avatar { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; margin-left: -2px; }

        /* -------------------------
           메인 콘텐츠
        -------------------------- */
        .main-content { margin-left: 240px; padding-top: 56px; flex: 1; min-height: 100vh; background-color: #fff; }
        .category-chips { display: flex; gap: 12px; padding: 12px 24px; overflow-x: auto; white-space: nowrap; background-color: #fff; position: sticky; top: 56px; z-index: 998; }
        .category-chips::-webkit-scrollbar { display: none; }
        .chip { background-color: rgba(0,0,0,0.05); border: none; padding: 8px 12px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; color: #0f0f0f; }
        .chip.active { background-color: #0f0f0f; color: #fff; }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 40px 16px; padding: 24px; }
        .video-card { display: flex; flex-direction: column; cursor: pointer; text-decoration: none; color: inherit; }
        .thumbnail-container { position: relative; width: 100%; padding-top: 56.25%; border-radius: 12px; overflow: hidden; background-color: #e5e5e5; }
        .thumbnail-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .duration-badge { position: absolute; bottom: 8px; right: 8px; background-color: rgba(0, 0, 0, 0.8); color: #fff; padding: 3px 4px; border-radius: 4px; font-size: 12px; font-weight: 500; }

        .info-container { display: flex; margin-top: 12px; gap: 12px; }
        .channel-avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; object-fit: cover; }
        .text-info { flex-grow: 1; overflow: hidden; }
        .video-title { font-size: 16px; font-weight: 600; line-height: 1.4; color: #0f0f0f; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
        .channel-name, .video-meta { font-size: 14px; color: #606060; margin-bottom: 2px; }
        .video-meta span { color: #606060; }

        /* 🔥 반응형 미디어 쿼리 (모바일 화면 설정) 🔥 */
        @media (max-width: 768px) {
            /* 상단 바 좌우 버튼 교체 및 간소화 */
            .header-center { display: none; }
            .create-icon-btn, .notification-icon-btn { display: none; }
            .menu-icon { display: none; } /* PC용 좌측 햄버거 숨김 */
            .menu-icon-mobile { display: block; } /* 🔥 모바일용 우측 햄버거 보임 🔥 */
            
            /* 메인 콘텐츠 여백 조정 */
            .main-content { margin-left: 0; padding-bottom: 20px; }
            .video-grid { grid-template-columns: 1fr; padding: 0; gap: 24px; }
            .thumbnail-container { border-radius: 0; }
            .info-container { padding: 0 12px; }
            .category-chips { padding: 12px; }

            /* 🔥 사이드바를 우측으로 이동시키고 기본적으로 숨김 🔥 */
            .sidebar { 
                top: 0; 
                left: auto;
                right: 0; /* 우측에 붙임 */
                height: 100vh; 
                padding-top: 56px; 
                transform: translateX(100%); /* 오른쪽 화면 밖으로 완전히 밀어내어 숨김 */
                transition: transform 0.3s ease-in-out; 
                box-shadow: -2px 0 12px rgba(0,0,0,0.2);
            }
            .sidebar.open {
                transform: translateX(0); /* 버튼 누르면 오른쪽에서 스르륵 나타남 */
            }

            /* 목록 바 열렸을 때 뒷배경 오버레이 */
            .sidebar-overlay {
                display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
                background-color: rgba(0,0,0,0.5); z-index: 998;
                opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
            }
            .sidebar-overlay.open {
                opacity: 1; pointer-events: auto;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-left">
            <button class="menu-icon" id="menuToggleBtnPC">
                <div class="icon"><svg viewBox="0 0 24 24"><path d="M21 6H3V5h18v1zm0 5H3v1h18v-1zm0 6H3v1h18v-1z"></path></svg></div>
            </button>
            <a href="#" class="logo-container">
                <div class="logo-play-button"></div>
                <span class="logo-text">MYTUBE</span>
            </a>
        </div>
        <div class="header-center">
            <form class="search-form">
                <input type="text" placeholder="검색" class="search-input">
                <button type="submit" class="search-icon-btn"><div class="icon" style="width: 20px; height: 20px; margin: 0 auto;"><svg viewBox="0 0 24 24"><path d="M20.87 20.17l-5.59-5.59C16.35 13.35 17 11.75 17 10c0-3.87-3.13-7-7-7s-7 3.13-7 7 3.13 7 7 7c1.75 0 3.35-.65 4.58-1.71l5.59 5.59.7-.71zM10 16c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z"></path></svg></div></button>
            </form>
            <button class="mic-icon-btn"><div class="icon" style="width: 20px; height: 20px;"><svg viewBox="0 0 24 24"><path d="M12 3c-1.66 0-3 1.37-3 3.07v5.86c0 1.7 1.34 3.07 3 3.07s3-1.37 3-3.07V6.07C15 4.37 13.66 3 12 3zm6.5 9h-1c0 3.03-2.47 5.5-5.5 5.5S6.5 15.03 6.5 12h-1c0 3.24 2.39 5.93 5.5 6.41V21h2v-2.59c3.11-.48 5.5-3.17 5.5-6.41z"></path></svg></div></button>
        </div>
        <div class="header-right">
            <button class="create-icon-btn"><div class="icon" style="width: 20px; height: 20px;"><svg viewBox="0 0 24 24"><path d="M14 13h-3v3H9v-3H6v-2h3V8h2v3h3v2zm3-7H3v12h14v-6.39l4 1.83V8.56l-4 1.83V6m1-1v3.83L22 7v8l-4-1.83V19H2V5h16z"></path></svg></div>만들기</button>
            <button class="notification-icon-btn"><div class="icon"><svg viewBox="0 0 24 24"><path d="M10 20h4c0 1.1-.9 2-2 2s-2-.9-2-2zm10-2.65V19H4v-1.65l2-1.88v-5.15C6 7.4 7.56 5.1 10 4.34v-.38c0-1.42 1.49-2.5 2.99-1.76.65.32 1.01 1.03 1.01 1.76v.39c2.44.75 4 3.06 4 5.98v5.15l2 1.87zm-1 .42-2-1.88v-5.15c0-2.4-1.26-4.23-3.21-4.94-.36-.13-.75-.26-1.14-.36C10.51 5.07 9 6.27 9 7.8v9.06l-2 1.88v.41h12v-.4z"></path></svg></div></button>
            <img src="./image_3.png" alt="A조 프로필" class="user-avatar">
            
            <button class="menu-icon-mobile" id="menuToggleBtnMobile">
                <div class="icon"><svg viewBox="0 0 24 24"><path d="M21 6H3V5h18v1zm0 5H3v1h18v-1zm0 6H3v1h18v-1z"></path></svg></div>
            </button>
        </div>
    </header>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <nav class="sidebar" id="sidebarMenu">
        <a href="#" class="sidebar-item active">
            <div class="icon"><svg viewBox="0 0 24 24"><path d="M4 21V10.08l8-6.96 8 6.96V21h-6v-6h-4v6H4z"></path></svg></div>
            <span class="sidebar-text">홈</span>
        </a>
        <a href="#" class="sidebar-item">
            <div class="icon"><svg viewBox="0 0 24 24"><path d="M10 14.65v-5.3L15 12l-5 2.65zm7.77-4.33-1.2-.5L18 9.06c1.84-.96 2.53-3.23 1.56-5.06s-3.24-2.53-5.07-1.56L6 6.94c-1.29.68-2.07 2.04-2 3.49.06 1.42.94 2.66 2.23 3.14l1.2.5L6 14.94c-1.84.96-2.53 3.23-1.56 5.06s3.24 2.53 5.07 1.56l8.5-4.5c1.29-.68 2.06-2.04 2-3.49-.06-1.42-.94-2.66-2.23-3.14z"></path></svg></div>
            <span class="sidebar-text">쇼츠</span>
        </a>
        <a href="#" class="sidebar-item">
            <div class="icon"><svg viewBox="0 0 24 24"><path d="M10 18v-6l5 3-5 3zm7-15H7v1h10V3zm3 3H4v1h16V6zm2 3H2v12h20V9zM3 10h18v10H3V10z"></path></svg></div>
            <span class="sidebar-text">구독</span>
        </a>
        <a href="#" class="sidebar-item">
            <img src="./image_3.png" alt="A조 프로필" class="sidebar-avatar">
            <span class="sidebar-text">나</span>
        </a>
    </nav>

    <main class="main-content">
        <div class="category-chips">
            <button class="chip active">전체</button>
            <button class="chip">음악</button>
            <button class="chip">믹스</button>
            <button class="chip">라이브</button>
            <button class="chip">성수동 핫플</button>
            <button class="chip">서울 브이로그</button>
        </div>

        <div class="video-grid">
            <a href="#" class="video-card">
                <div class="thumbnail-container">
                    <img src="./image_1.png" alt="성수동 브이로그 (낮)" class="thumbnail-img">
                    <span class="duration-badge">1:00</span>
                </div>
                <div class="info-container">
                    <img src="./image_3.png" alt="A조 프로필" class="channel-avatar">
                    <div class="text-info">
                        <h3 class="video-title">성수동 브이로그 요즘 핫플 정복!🔥 디올부터 하우스 노웨어까지✨</h3>
                        <div class="channel-name">E-비즈니스와 웹 애널리틱스_ A조</div>
                        <div class="video-meta">조회수 240회 <span>•</span> 1주 전</div>
                    </div>
                </div>
            </a>

            <a href="#" class="video-card">
                <div class="thumbnail-container">
                    <img src="./image_2.png" alt="성수동 브이로그 (저녁)" class="thumbnail-img">
                    <span class="duration-badge">1:00</span>
                </div>
                <div class="info-container">
                    <img src="./image_3.png" alt="A조 프로필" class="channel-avatar">
                    <div class="text-info">
                        <h3 class="video-title">성수동 브이로그 요즘 핫플 정복!🔥 디올부터 하우스 노웨어까지✨</h3>
                        <div class="channel-name">E-비즈니스와 웹 애널리틱스_ A조</div>
                        <div class="video-meta">조회수 240회 <span>•</span> 1주 전</div>
                    </div>
                </div>
            </a>
        </div>
    </main>

    <script>
        const menuBtnPC = document.getElementById('menuToggleBtnPC');
        const menuBtnMobile = document.getElementById('menuToggleBtnMobile');
        const sidebar = document.getElementById('sidebarMenu');
        const overlay = document.getElementById('sidebarOverlay');

        // 사이드바 토글 함수
        function toggleSidebar() {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('open');
        }

        // PC와 모바일 버튼에 각각 클릭 이벤트 연결
        if (menuBtnPC) menuBtnPC.addEventListener('click', toggleSidebar);
        if (menuBtnMobile) menuBtnMobile.addEventListener('click', toggleSidebar);

        // 어두운 배경 클릭 시 닫기
        overlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('open');
        });
    </script>
</body>
</html>
